services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vue3-prod
    ports:
      - "80:80"
    environment:
      # API 后端（编号格式，第一个为主，后续为备用）
      - APP_API_1_URL=https://api.xrteeth.com
      - APP_API_2_URL=https://api.tmrpp.com
      # 配置 API（system-admin 后端，必须是 host-only backend origin，不能带 /api 路径）
      - APP_CONFIG_1_URL=http://system-admin-backend:8088
      - APP_CONFIG_2_URL=http://system-admin-backup:8088
      # 文档 API
      - APP_DOC_API_URL=https://hololens2.cn/wp-json/wp/v2
      # Blockly / Editor iframe URL（运行时注入）
      - APP_BLOCKLY_URL=https://blockly.bujiaban.com
      - APP_EDITOR_URL=https://editor.bujiaban.com
      # Unity WebGL 运行器 URL（运行时注入；当前生产建议使用主站同域代理）
      - APP_UNITY_PREVIEW_URL=/webgl-preview/embed.html
      - APP_UNITY_PREVIEW_UPSTREAM=https://webgl-preview.plugins.xrugc.com
      # 插件 URL（运行时注入到 plugins.json）
      - PLUGIN_USER_MANAGEMENT_URL=http://localhost:3003
      - PLUGIN_SYSTEM_ADMIN_URL=http://localhost:3005
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
