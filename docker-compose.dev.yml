services:
  vue3-dev:
    build:
      context: .
      target: dev
    container_name: vue3-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_APP_API_URL=https://api.xrteeth.com
      - VITE_APP_CONFIG_API_URL=http://host.docker.internal:8088
      - VITE_APP_DOMAIN_INFO_API_URL=https://domain.xrteeth.com
      - NGINX_PORT=80
      - VITE_APP_PORT=3000
      # 插件 URL（运行时注入到 plugins.json）
      - PLUGIN_USER_MANAGEMENT_URL=http://localhost:3003
      - PLUGIN_SYSTEM_ADMIN_URL=http://localhost:3005
      - PLUGIN_AR_SLAM_LOCALIZATION_URL=http://localhost:3016
    command: pnpm run dev --host
