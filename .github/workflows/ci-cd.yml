name: CI/CD

on:
  push:
    branches:
      [
        main,
        master,
        develop,
        publish,
        "openclaw/improvements",
        "feature/nginx-api-proxy",
      ]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  REGISTRY: hkccr.ccs.tencentyun.com
  IMAGE_NAME: gdgeek/vue3
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 测试
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint:check

      - name: Format check
        run: pnpm run format:prettier
        continue-on-error: false

      - name: Run tests
        run: pnpm run test:run

      - name: Coverage check (lines ≥ 30%)
        run: pnpm run test:coverage

  # 构建（仅 push 到 main/master）
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/publish' || github.ref == 'refs/heads/openclaw/improvements' || github.ref == 'refs/heads/feature/nginx-api-proxy')
    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TENCENT_DOCKER_USERNAME }}
          password: ${{ secrets.TENCENT_DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_MODE=production
          cache-from: type=gha
          cache-to: type=gha,mode=max
