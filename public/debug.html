<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runtime Config Debug</title>
  <script src="/env-config.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
    }

    h1 {
      color: #00d4ff;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      background: #16213e;
      color: #00d4ff;
      font-size: 13px;
      border-bottom: 2px solid #0f3460;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid #1a1a3e;
      font-size: 13px;
    }

    td:first-child {
      color: #aaa;
      width: 280px;
    }

    .val {
      word-break: break-all;
    }

    .ok {
      color: #4ade80;
    }

    .warn {
      color: #fbbf24;
    }

    .err {
      color: #f87171;
    }

    .section {
      color: #00d4ff;
      font-size: 15px;
      font-weight: bold;
      margin: 20px 0 8px;
    }

    #nginx-test {
      margin-top: 16px;
    }

    .test-row td {
      font-size: 12px;
    }

    button {
      background: #0f3460;
      color: #00d4ff;
      border: 1px solid #00d4ff;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 12px;
    }

    button:hover {
      background: #16213e;
    }
  </style>
</head>

<body>
  <h1>⚙️ Runtime Config Debug</h1>
  <p class="subtitle" id="info"></p>

  <div class="section">Window 全局变量 (env-config.js)</div>
  <table>
    <tr>
      <th>变量</th>
      <th>值</th>
      <th>状态</th>
    </tr>
    <tbody id="window-vars"></tbody>
  </table>

  <div class="section">Nginx 反向代理测试</div>
  <table>
    <tr>
      <th>路径</th>
      <th>状态码</th>
      <th>结果</th>
      <th>响应预览</th>
    </tr>
    <tbody id="proxy-tests"></tbody>
  </table>
  <button onclick="runProxyTests()">重新测试</button>

  <div class="section">env-config.js 原始内容</div>
  <pre id="raw-config"
    style="background:#16213e;padding:12px;border-radius:4px;font-size:12px;overflow-x:auto;margin-top:8px;"></pre>

  <script>
    document.getElementById('info').textContent =
      '页面: ' + location.hostname + ' | 时间: ' + new Date().toLocaleString();

    // 检查 window 全局变量
    const windowVars = [
      ['window.__DOMAIN_INFO_API_URL__', window.__DOMAIN_INFO_API_URL__],
      ['window.__BACKUP_DOMAIN_INFO_API_URL__', window.__BACKUP_DOMAIN_INFO_API_URL__],
      ['window.__API_URL__', window.__API_URL__],
      ['window.__BACKUP_API_URL__', window.__BACKUP_API_URL__],
    ];

    const tbody = document.getElementById('window-vars');
    windowVars.forEach(([name, val]) => {
      const status = val && val !== '' && !val.startsWith('$')
        ? '<span class="ok">✓ 已注入</span>'
        : val && val.startsWith('$')
          ? '<span class="err">✗ 未替换 (envsubst 未生效)</span>'
          : '<span class="warn">— 未定义</span>';
      tbody.innerHTML += `<tr><td>${name}</td><td class="val">${val || '(undefined)'}</td><td>${status}</td></tr>`;
    });

    // 测试反向代理
    async function testPath(path) {
      try {
        const resp = await fetch(path, { redirect: 'manual' });
        const body = await resp.text().catch(() => '');
        const preview = body.length > 80 ? body.substring(0, 80) + '...' : body;
        return { status: resp.status, ok: resp.status < 500, body: preview };
      } catch (e) {
        return { status: 'ERR: ' + e.message, ok: false, body: '' };
      }
    }

    async function runProxyTests() {
      const tests = [
        '/api/health',
        '/api/v1/auth/login',
        '/api-backup/health',
        '/api-backup/',
        '/env-config.js',
      ];
      const ptbody = document.getElementById('proxy-tests');
      ptbody.innerHTML = '';
      for (const path of tests) {
        const r = await testPath(path);
        const cls = r.ok ? 'ok' : 'err';
        ptbody.innerHTML += `<tr class="test-row"><td>${path}</td><td class="${cls}">${r.status}</td><td class="${cls}">${r.ok ? '可达' : '不可达'}</td><td style="font-size:11px;color:#888;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.body || ''}</td></tr>`;
      }
    }

    // 加载 env-config.js 原始内容
    fetch('/env-config.js')
      .then(r => r.text())
      .then(t => document.getElementById('raw-config').textContent = t)
      .catch(e => document.getElementById('raw-config').textContent = '加载失败: ' + e.message);

    runProxyTests();
  </script>
</body>

</html>
